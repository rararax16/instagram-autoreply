services:
  mysql:
    build:
      context: ./db
      dockerfile: dockerfile
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
      TZ: Asia/Tokyo
    ports:
      - "33061:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./app
      dockerfile: dockerfile
    restart: unless-stopped
    env_file:
      - ./app/.env
    environment:
      DATABASE_URL: mysql://app_user:app_pass@mysql:3306/app_db
      NODE_ENV: development
      TZ: Asia/Tokyo
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      mysql:
        condition: service_healthy
    working_dir: /app
    command: sh -c "npm install && echo 'app コンテナ起動済み。docker compose -f docker-compose.dev.yml exec app bash で入り、npm run dev を実行してください。' && tail -f /dev/null"
    volumes:
      - ./app:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "24678:24678"

volumes:
  mysql_data:
